apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
  template:
    metadata:
      labels:
        app: aceest
    spec:
      containers:
      - name: aceest-container
        image: kspraveena92/aceest-devops:latest
        ports:
        - containerPort: 5000